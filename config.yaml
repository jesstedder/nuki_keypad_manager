name: "Nuki Keypad Manager"
version: "0.3.2"
slug: "nuki_keypad_manager"
description: "List and create Nuki Keypad PIN codes from a Home Assistant sidebar panel"
url: "https://github/jesstedder/nuki_keypad_manager"
arch:
  - aarch64
  - amd64
  - armv7
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:dialpad
panel_title: "Nuki Keypad"
homeassistant_api: true
hassio_api: true
options:
  nuki_api_token: ""
  lock_entities: ""
schema:
  nuki_api_token: str
  lock_entities: str
